        body {
            background-color: #121409;

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation (Transactional/Focused intent, so shell nav is suppressed, custom top bar for workout) -->
<header class="flex justify-between items-center px-container-margin py-4 w-full border-b-[0.5px] border-outline-variant bg-background z-10 sticky top-0">
<div class="font-display-lg text-headline-md uppercase text-on-background">
            PUSH A
        </div>
<div class="font-stat-lg text-stat-lg text-primary-container flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container animate-pulse" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
            00:34:12
        </div>
<button class="bg-transparent border border-on-background text-on-background px-4 py-2 font-label-caps text-label-caps rounded uppercase hover:bg-surface-variant transition-colors">
            END
        </button>
</header>
<main class="flex-grow flex flex-col px-container-margin py-8 gap-section-gap">
<!-- Exercise Header -->
<section class="flex flex-col gap-4 relative">
<div class="absolute -top-4 -left-4 w-4 h-4 border-t border-l border-primary-container/50"></div>
<div class="absolute -top-4 -right-4 w-4 h-4 border-t border-r border-primary-container/50"></div>
<div class="flex justify-between items-end border-b-[0.5px] border-outline-variant pb-4">
<div class="flex flex-col gap-2">
<span class="font-stat-sm text-stat-sm text-on-surface-variant uppercase tracking-widest">SET 3 OF 5</span>
<h1 class="font-display-lg text-display-lg text-primary-container uppercase leading-none break-words max-w-[80%]">INCLINE BENCH PRESS</h1>
</div>
<div class="flex gap-2">
<!-- Set Indicators -->
<div class="w-8 h-8 bg-primary-container"></div>
<div class="w-8 h-8 bg-primary-container"></div>
<div class="w-8 h-8 border-2 border-primary-container relative">
<div class="absolute inset-2 bg-primary-container/30"></div>
</div>
<div class="w-8 h-8 border border-outline-variant"></div>
<div class="w-8 h-8 border border-outline-variant"></div>
</div>
</div>
<div class="flex justify-between items-center bg-surface-container p-4 rounded-none border-[0.5px] border-outline-variant">
<span class="font-body-md text-body-md text-on-surface-variant uppercase">PERFORMANCE</span>
<span class="font-stat-lg text-stat-lg text-on-background">TARGET: 82.5kg × 8</span>
</div>
</section>
<!-- Input Section -->
<section class="flex flex-col gap-4 flex-grow">
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant">WEIGHT (KG)</label>
<input class="bg-surface-container-high border-b-2 border-on-background text-on-background font-stat-lg text-display-lg h-24 px-4 py-2 focus:outline-none focus:border-primary-container focus:ring-0 text-center w-full appearance-none transition-colors" type="number" value="82.5"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant">REPS</label>
<input class="bg-surface-container-high border-b-2 border-on-background text-on-background font-stat-lg text-display-lg h-24 px-4 py-2 focus:outline-none focus:border-primary-container focus:ring-0 text-center w-full appearance-none transition-colors" type="number" value="8"/>
</div>
</div>
<button class="w-full bg-primary-container text-background font-display-lg text-headline-md h-20 uppercase mt-4 hover:bg-primary transition-colors flex items-center justify-center gap-4 group">
                LOG SET
                <span class="material-symbols-outlined font-bold group-hover:translate-x-2 transition-transform">arrow_forward</span>
</button>
</section>
<!-- AI Nudge Strip -->
<section class="bg-surface border border-outline-variant p-4 flex gap-4 items-start relative mt-auto">
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-primary-container/0 via-primary-container/50 to-primary-container/0"></div>
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<p class="font-body-md text-body-lg text-on-background italic">
                Try pausing at the top for 1s. Last set showed minor instability on the eccentric phase.
            </p>
</section>
<!-- Rest Timer (Visible when resting, here shown as contextual preview) -->
<section class="flex flex-col items-center justify-center gap-4 opacity-50 pointer-events-none mt-8 border-t border-outline-variant pt-8">
<span class="font-label-caps text-label-caps text-on-surface-variant">REST TIMER</span>
<div class="font-display-xl text-display-xl text-on-background tracking-tighter">
                01:30
            </div>
<div class="w-full h-2 bg-surface-container overflow-hidden">
<div class="h-full bg-outline-variant w-1/3"></div>
</div>
</section>
</main>
