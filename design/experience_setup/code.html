<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Experience Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700&amp;family=JetBrains+Mono:wght@500;600&amp;family=Anybody:wght@800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#e3e4d0",
                        "on-primary-fixed": "#181e00",
                        "on-error": "#690005",
                        "background": "#121409",
                        "on-tertiary-fixed": "#001e2c",
                        "secondary-fixed": "#e4e3da",
                        "surface-container": "#1f2114",
                        "outline-variant": "#454933",
                        "on-primary": "#2c3400",
                        "error-container": "#93000a",
                        "primary-fixed-dim": "#b6d300",
                        "primary-fixed": "#d0f118",
                        "inverse-on-surface": "#303224",
                        "primary-container": "#c8e800",
                        "tertiary-fixed": "#c3e8ff",
                        "surface-container-high": "#292b1e",
                        "on-tertiary": "#003549",
                        "secondary-container": "#494a43",
                        "on-surface": "#e3e4d0",
                        "on-tertiary-container": "#32657f",
                        "tertiary": "#eff8ff",
                        "surface-variant": "#343628",
                        "on-primary-container": "#576600",
                        "on-secondary-fixed": "#1b1c17",
                        "inverse-surface": "#e3e4d0",
                        "secondary-fixed-dim": "#c7c7be",
                        "tertiary-container": "#afe1ff",
                        "on-primary-fixed-variant": "#404c00",
                        "on-secondary": "#30312b",
                        "on-secondary-container": "#b9b9b0",
                        "surface-dim": "#121409",
                        "on-secondary-fixed-variant": "#464741",
                        "surface-container-low": "#1b1d10",
                        "on-tertiary-fixed-variant": "#124c65",
                        "surface-tint": "#b6d300",
                        "on-surface-variant": "#c6c9ad",
                        "surface-container-highest": "#343628",
                        "primary": "#efffa1",
                        "on-error-container": "#ffdad6",
                        "outline": "#909379",
                        "surface": "#121409",
                        "surface-bright": "#383a2c",
                        "secondary": "#c7c7be",
                        "surface-container-lowest": "#0d0f05",
                        "tertiary-fixed-dim": "#9bcdea",
                        "inverse-primary": "#566500",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "section-gap": "48px",
                        "gutter": "16px",
                        "container-margin": "24px"
                    },
                    "fontFamily": {
                        "label-caps": ["Hanken Grotesk"],
                        "stat-sm": ["JetBrains Mono"],
                        "stat-lg": ["JetBrains Mono"],
                        "body-lg": ["Hanken Grotesk"],
                        "display-lg": ["Anybody"],
                        "display-xl": ["Anybody"],
                        "body-md": ["Hanken Grotesk"],
                        "headline-md": ["Anybody"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "100%", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "stat-sm": ["14px", { "lineHeight": "100%", "fontWeight": "500" }],
                        "stat-lg": ["24px", { "lineHeight": "100%", "letterSpacing": "-0.05em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "150%", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "100%", "letterSpacing": "-0.01em", "fontWeight": "800" }],
                        "display-xl": ["80px", { "lineHeight": "100%", "letterSpacing": "-0.02em", "fontWeight": "900" }],
                        "body-md": ["16px", { "lineHeight": "150%", "fontWeight": "400" }],
                        "headline-md": ["32px", { "lineHeight": "110%", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-container text-background min-h-screen flex flex-col items-center justify-center font-body-md overflow-hidden antialiased p-container-margin">
<!-- Top Navigation (Transactional so hidden, but requested no nav shell anyway) -->
<main class="w-full max-w-2xl flex flex-col h-full flex-grow relative z-10 grid grid-cols-4 md:grid-cols-12 gap-gutter">
<!-- Grid Content Wrapper -->
<div class="col-span-4 md:col-span-12 flex flex-col h-full justify-between items-center py-section-gap">
<!-- Heading -->
<header class="w-full text-center mt-section-gap">
<h1 class="font-headline-md text-headline-md uppercase text-background">
                    HOW LONG HAVE YOU BEEN LIFTING?
                </h1>
</header>
<!-- Center Display -->
<div class="flex-grow flex flex-col items-center justify-center w-full my-section-gap">
<div class="font-display-xl text-display-xl text-background tracking-tighter mb-12">
                    3 YEARS
                </div>
<!-- Scrubber Component -->
<div class="w-full max-w-md px-gutter relative mt-8">
<!-- The Track -->
<div class="h-[2px] bg-background w-full absolute top-1/2 left-0 transform -translate-y-1/2"></div>
<!-- The Filled Track (Progress) -->
<div class="h-[4px] bg-background absolute top-1/2 left-0 transform -translate-y-1/2 z-10 w-[30%]"></div>
<!-- The Handle -->
<div class="w-4 h-4 bg-background absolute top-1/2 left-[30%] transform -translate-x-1/2 -translate-y-1/2 z-20 cursor-pointer"></div>
<!-- Labels -->
<div class="flex justify-between w-full mt-6 text-background opacity-80">
<span class="font-stat-sm text-stat-sm uppercase">0 MONTHS</span>
<span class="font-stat-sm text-stat-sm uppercase">10+ YEARS</span>
</div>
</div>
<!-- Subtext -->
<div class="mt-12 text-center max-w-sm px-gutter">
<p class="font-body-md text-body-md text-background opacity-80">
                        This determines your starting program complexity.
                    </p>
</div>
</div>
<!-- Bottom CTA -->
<div class="w-full mb-section-gap px-gutter flex justify-center">
<button class="bg-background text-primary-container font-label-caps text-label-caps uppercase py-4 px-12 w-full md:w-auto hover:bg-opacity-90 transition-opacity flex items-center justify-center gap-2 group">
                    NEXT
                    <span class="material-symbols-outlined text-[16px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</main>
</body></html>
