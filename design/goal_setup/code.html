<body class="bg-[#0A0A08] text-on-background min-h-screen flex flex-col font-body-md antialiased md:px-container-margin md:py-container-margin selection:bg-primary-container selection:text-black">
<!-- Top AppBar Structure (Transactional, no global nav shell) -->
<header class="flex justify-between items-center px-gutter py-4 w-full md:px-0">
<!-- Step Indicator -->
<div class="flex gap-base h-6">
<div class="w-[2px] bg-primary-container h-full"></div>
<div class="w-[2px] bg-surface-variant h-full"></div>
<div class="w-[2px] bg-surface-variant h-full"></div>
</div>
<!-- Close/Back Action implied for transactional -->
<button aria-label="Go back" class="text-on-background flex items-center justify-center p-2 rounded-sm border border-transparent hover:border-outline-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 300;">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-gutter md:px-0 mt-section-gap w-full max-w-2xl mx-auto">
<!-- Header Section -->
<div class="mb-section-gap">
<h1 class="font-display-lg text-display-lg text-primary-container uppercase mb-4 tracking-tighter leading-none">
                WHAT'S YOUR MISSION?
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md">
                We'll build everything around it.
            </p>
</div>
<!-- Goal Selection Cards -->
<div class="flex flex-col gap-4 flex-grow">
<!-- Selected Card -->
<button class="w-full h-[72px] bg-primary-container text-[#121409] border-[0.5px] border-primary-container flex items-center justify-between px-5 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-primary-container group">
<span class="font-headline-md text-headline-md uppercase tracking-tight">STRENGTH</span>
<span class="material-symbols-outlined text-[#121409] group-hover:translate-x-1 transition-transform" style="font-variation-settings: 'wght' 600;">arrow_forward</span>
</button>
<!-- Unselected Card 1 -->
<button class="w-full h-[72px] bg-[#1C1C18] text-on-background border-[0.5px] border-outline-variant flex items-center justify-between px-5 hover:border-primary-container transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-primary-container group">
<span class="font-headline-md text-headline-md uppercase tracking-tight text-on-surface-variant group-hover:text-on-background transition-colors">MUSCLE</span>
</button>
<!-- Unselected Card 2 -->
<button class="w-full h-[72px] bg-[#1C1C18] text-on-background border-[0.5px] border-outline-variant flex items-center justify-between px-5 hover:border-primary-container transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-primary-container group">
<span class="font-headline-md text-headline-md uppercase tracking-tight text-on-surface-variant group-hover:text-on-background transition-colors">CONDITIONING</span>
</button>
</div>
</main>
<!-- Bottom Action Area -->
<div class="px-gutter pb-8 md:px-0 md:pb-0 mt-section-gap w-full max-w-2xl mx-auto flex justify-end">
<button class="font-stat-lg text-stat-lg text-primary-container bg-transparent flex items-center gap-2 uppercase tracking-widest hover:opacity-80 transition-opacity focus:outline-none">
            NEXT 
            <span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'wght' 600;">arrow_forward</span>
</button>
</div>
</body></html>
